{% extends "base.html" %}


{% block title %}TMS Web - Home{% endblock %}

{% block content %}
<section class="search-card">
    <h1 class="search-title">Tìm nhanh công cụ / vật tư</h1>
    <p class="search-sub">Nhập tên công cụ, mã, vị trí… (sau này sẽ đọc dữ liệu từ SQLite3).</p>

    <div class="search-bar-wrapper">
        <form class="search-bar" action="#" method="get">
            <span class="search-icon">🔍</span>
            <input
                type="text"
                class="search-input"
                name="q"
                placeholder="Ví dụ: Tô vít 4 cạnh, Kìm điện số 7, Ngăn tủ A3…"
                autocomplete="off"
            />
            <button class="search-button" type="submit">Tìm kiếm</button>
        </form>
    </div>
</section>
{% endblock %}
